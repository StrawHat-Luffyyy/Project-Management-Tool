version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: jira_postgres
    environment:
      POSTGRES_USER: krishmac1209_db_user
      POSTGRES_PASSWORD: super_secret_password
      POSTGRES_DB: jira_clone_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: jira_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  pgdata:
    name: jira_pg_data